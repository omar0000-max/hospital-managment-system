<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HMS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-around;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 15px;
            background-color: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        input, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card-box h3 {
            margin-bottom: 10px;
        }

        .card-box p {
            color: #555;
            margin-bottom: 15px;
        }

        .card-box button {
           background-color: #2c3e50;
        }

        .card-box:hover {
           transform: translateY(-5px);
           transition: 0.3s;
        } 
    </style>
</head>
<body>

<div class="navbar">
    <a href="/patients/">Patients</a>
    <a href="/appointments/">Appointments</a>
    <a href="/medicines/">Medicines</a>
    <a href="/prescription/">Prescription</a>
    <a href="{% url 'doctors' %}">Doctors</a>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
